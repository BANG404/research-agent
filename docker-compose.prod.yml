# Production stack: LangGraph server + frontend + full Milvus standalone
#
# Prerequisites:
#   1. Build LangGraph image:  make build
#   2. Copy .env.example → .env and fill in API keys
#   3. Start this stack:       make up-prod
#
# LangGraph server → http://localhost:8123
# Frontend UI      → http://localhost:3000
# Milvus Attu UI   → http://localhost:8888
# MinIO console    → http://localhost:9001
#
# Ingest data (run after stack is healthy):
#   make ingest-prod

services:
  # ── Milvus dependencies ────────────────────────────────────────────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.5.0
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    networks:
      - app
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  attu:
    image: zilliz/attu:v2.4
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8888:3000"
    networks:
      - app
    depends_on:
      milvus-standalone:
        condition: service_healthy
    restart: unless-stopped

  # ── App dependencies ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: langgraph
      POSTGRES_DB: langgraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application ────────────────────────────────────────────────────────────

  langgraph-server:
    image: research-agent:latest
    ports:
      - "8123:8000"
    env_file:
      - .env
    environment:
      DATABASE_URI: postgres://langgraph:langgraph@postgres:5432/langgraph
      REDIS_URI: redis://redis:6379
      # Full Milvus standalone — enables BM25 hybrid search automatically
      APP_MILVUS_URI: http://milvus-standalone:19530
    networks:
      - app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    restart: unless-stopped

  agent-chat-ui:
    build:
      context: ./src/agent-chat-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8123
    ports:
      - "3000:3000"
    networks:
      - app
    depends_on:
      - langgraph-server
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  postgres_data:
